<!DOCTYPE html>
<html>
<head>
  <title>Lab 7 Inventory System</title>
  <link rel="stylesheet" href="Labby 7.css">
</head>

<body>

<h1>Producto Inventory</h1>

<form id="productForm">

  <label>Product Name:
    <input type="text" id="productName" required>
  </label>

  <br><br>

  <label>Price:
    <input type="number" id="productPrice" step="0.01" required>
  </label>

  <br><br>

  <label>Stock:
    <input type="number" id="productStock" required>
  </label>

  <br><br>

  <button>Add Product</button>

</form>

<br>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Price</th>
      <th>Stock</th>
    </tr>
  </thead>

  <tbody id="tableBody"></tbody>
</table>

<script>

const InventorySystem = {

  inventory: [
    { id: 1, name: "Milk", price: 50.00, stock: 20 },
    { id: 2, name: "Bread", price: 30.00, stock: 15 },
    { id: 3, name: "Rice", price: 60.00, stock: 40 },
    { id: 4, name: "Eggs", price: 10.00, stock: 0 },
    { id: 5, name: "Sugar", price: 45.00, stock: 25 }
  ],

  getStock(stock) {
    if (stock === 0) return "out-of-stock";
    if (stock <= 20) return "low-stock";
    return "normal-stock";
  },

  renderTable() {

    let tableBody = document.getElementById("tableBody");

    tableBody.innerHTML = "";

    this.inventory.forEach(item => {
      tableBody.innerHTML += `
        <tr>
          <td>${item.id}</td>
          <td>${item.name}</td>
          <td>₱${item.price.toFixed(2)}</td>
          <td class="${this.getStock(item.stock)}">${item.stock}</td>
        </tr>
      `;
    });

  },

  addProduct(name, price, stock) {

    this.inventory.push({
      id: this.inventory.length + 1,
      name: name,
      price: parseFloat(price),
      stock: parseInt(stock)
    });

    this.renderTable();
  }
};

InventorySystem.renderTable();

document.getElementById("productForm").addEventListener("submit", function(e) {

  e.preventDefault();

  InventorySystem.addProduct(
    productName.value,
    productPrice.value,
    productStock.value
  );

  this.reset();

});

</script>

</body>
</html>
