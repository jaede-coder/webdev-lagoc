<html>
<head>
  <title>La Bistro</title>

  <link rel="stylesheet" href="valenty.css">
</head>

<body>

<h1>La Bistro</h1>

<form>

  <fieldset>
    <legend>Customer Information</legend>

    <label>
      Name:<br>
      <input type="text" name="name">
    </label>
    <br><br>

    <label>
      Email:<br>
      <input type="email" name="email">
    </label>
    <br><br>

    <label>
      Phone Number:<br>
      <input type="tel" name="phone">
    </label>

  </fieldset>

  <br>

  <fieldset>
    <legend>Reservation Details</legend>

    <label>
      Date:<br>
      <input type="date" name="date">
    </label>
    <br><br>

    <label>
      How many persons will be with you?<br>
      <input type="number" name="guests" min="1">
    </label>

  </fieldset>

  <br>

  <fieldset>
    <legend>Additional Notes</legend>

    <label>
      Notes:<br>
      <textarea name="notes"></textarea>
    </label>
    <br><br>

    <label>
      Entry:<br>
      <textarea name="entry"></textarea>
    </label>

  </fieldset>

  <br>

  <button type="submit">Submit</button>

</form>

</body>
</html>
